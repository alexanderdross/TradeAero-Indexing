# PR labels for cross-repo visibility on the Pull Requests tab.
# This file is the source of truth; the sync-labels job in
# .github/workflows/pr-labels.yml reconciles GitHub against it.

# --- type: change category (from conventional-commit prefix) ---
- name: "type: feat"
  color: "1f6feb"
  description: "New feature or capability."
- name: "type: fix"
  color: "1f6feb"
  description: "Bug fix."
- name: "type: perf"
  color: "1f6feb"
  description: "Performance improvement."
- name: "type: refactor"
  color: "1f6feb"
  description: "Code change that neither fixes a bug nor adds a feature."
- name: "type: docs"
  color: "1f6feb"
  description: "Documentation only."
- name: "type: test"
  color: "1f6feb"
  description: "Test coverage change."
- name: "type: ci"
  color: "1f6feb"
  description: "CI / workflow change."
- name: "type: chore"
  color: "1f6feb"
  description: "Routine maintenance; default when no other type matches."

# --- source: origin of the branch ---
- name: "source: claude"
  color: "8957e5"
  description: "Authored on a claude/* branch."
- name: "source: dependabot"
  color: "8957e5"
  description: "Opened by Dependabot."
- name: "source: human"
  color: "8957e5"
  description: "Manually authored (default for non-claude, non-dependabot branches)."

# --- area: product surface affected ---
- name: "area: deps"
  color: "2da44e"
  description: "Dependency manifest / lockfile change."
- name: "area: ci"
  color: "2da44e"
  description: "GitHub Actions workflows / CI config."
- name: "area: seo"
  color: "2da44e"
  description: "SEO surface (sitemap, robots, structured data, canonical, og)."
- name: "area: cachewarmer"
  color: "2da44e"
  description: "Cachewarmer service."
- name: "area: crawler"
  color: "2da44e"
  description: "Crawler service."
- name: "area: indexing"
  color: "2da44e"
  description: "Indexing service."
- name: "area: i18n"
  color: "2da44e"
  description: "Locales / translations / language routing."
- name: "area: admin-ui"
  color: "2da44e"
  description: "Admin / internal UI."

# --- modifiers (sparse, high-signal) ---
- name: "risk: major-bump"
  color: "d1242f"
  description: "Dependabot major version bump (historically requires follow-up)."
- name: "status: pre-prod-signoff"
  color: "bf8700"
  description: "Pre-production sign-off documentation."
- name: "needs: rename"
  color: "d4691c"
  description: "Auto-generated branch name (Claude/<adjective> <noun>) - please rename."
