# Dependabot configuration.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Weekly cadence is intentional — daily PR noise outweighs the value for
# a small worker-style service. Security advisories are exempt from the
# schedule and land as soon as Dependabot picks them up.

version: 2
updates:
  # Application dependencies (npm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group non-major bumps into a single PR per week to keep review
    # overhead bounded. Major bumps still come as individual PRs so
    # each one gets a deliberate review.
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    # TypeScript majors land before typescript-eslint catches up: TS 6.0
    # ships with a peer-dep / type-checker contract change that the v8
    # line of typescript-eslint can't satisfy, so a solo `typescript`
    # major bump ERESOLVEs (or fails lint) against the rest of the
    # devDependencies. We hit this on Dependabot PR #14. Lift the
    # ignore once typescript-eslint v9 (or whichever line officially
    # supports TS 6) is in the lockfile.
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
      include: scope

  # GitHub Actions used in .github/workflows/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
