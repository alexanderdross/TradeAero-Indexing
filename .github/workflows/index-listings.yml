name: "Index New Listings"

# Runs every 30 minutes to pick up newly published, fully-translated listings
# and submit their locale URLs to IndexNow + Google Indexing API.
#
# Translation gate: listings are only submitted after ALL 14 locale slugs are
# populated (enforced by the DB query in src/db/listings.ts).
#
# Idempotency: the dedupe_key unique index in indexing_events prevents duplicate
# submissions even if two runs briefly overlap (cancel-in-progress: false).

on:
  schedule:
    - cron: "*/30 * * * *"    # Every 30 minutes
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "Lookback window in minutes (default: 1440 = 24h; use 10080 for a 1-week backfill)"
        required: false
        default: "1440"
        type: string
      dry_run:
        description: "Dry run — discover and enqueue but skip external API calls"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      discovery_limit:
        description: "Max rows per source table per run (default 500; raise for a historical backfill)"
        required: false
        default: "500"
        type: string

env:
  NODE_VERSION: "22"

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Prevent concurrent runs from double-submitting the same URLs.
    # cancel-in-progress: false — let the current run finish;
    # the dedupe_key unique index handles any overlap at the DB level.
    concurrency:
      group: index-listings
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run indexer
        env:
          # Master kill switch. Intentionally sourced from `vars` (not `secrets`)
          # so it can be scoped per GitHub Environment (e.g. `production` leaves
          # it unset while trade.aero is still gated; `main`/`dev` sets it to
          # "true"). The service exits cleanly when this isn't "true", so a
          # missing var on a new branch is the safe default.
          INDEXING_ENABLED: ${{ vars.INDEXING_ENABLED }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
          # Optional: Google Indexing API via Service Account (faster than sitemap ping)
          # If not set, the indexer falls back to a sitemap ping for Google discovery.
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_INDEXING_ALL_LOCALES: ${{ vars.GOOGLE_INDEXING_ALL_LOCALES || 'false' }}
          # 24h default (not 60m): GitHub throttles this schedule to runs hours
          # apart, so a 60-minute window silently dropped any listing whose
          # updated_at fell between runs. dedupe_key makes the wider re-scan
          # idempotent — already-indexed listings are skipped at insert, so no
          # re-submission and no wasted Google quota.
          INDEXING_LOOKBACK_MINUTES: ${{ github.event.inputs.lookback_minutes || '1440' }}
          INDEXING_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INDEXING_DISCOVERY_LIMIT: ${{ github.event.inputs.discovery_limit || '500' }}
          # Optional dead-man's-switch (healthchecks.io / cronitor). When set, a
          # successful run pings this URL and a fatal error pings `<url>/fail`, so
          # an external monitor alerts if this schedule ever silently stops firing
          # (the 2026-05-28 stall produced no run, no logs, and no alert).
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
          # Optional Sentry error reporting. No-op when the secret is unset.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || github.ref_name }}
          # TEMP (sentry-smoke-check branch only): fire one Sentry test event and
          # exit to verify DSN/SDK/project wiring end-to-end. Not present on main.
          SENTRY_SMOKE_TEST: "1"
          LOG_LEVEL: "info"
        run: node dist/index.js
