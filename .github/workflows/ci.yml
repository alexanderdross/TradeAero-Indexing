name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit

  audit:
    name: Dependency audit (npm audit)
    runs-on: ubuntu-latest
    # `npm audit` doesn't need a node_modules install — runs against the
    # lockfile directly. Keep it standalone so it doesn't pad the other
    # jobs' minutes.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Gate at `critical` for the initial rollout — any existing
      # high-severity backlog will be cleared by Dependabot's weekly
      # PRs (see .github/dependabot.yml). Tighten to `--audit-level=high`
      # once the backlog is empty so newly-introduced high CVEs block
      # merge.
      - run: npm audit --audit-level=critical
